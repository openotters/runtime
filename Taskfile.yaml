version: '3'

includes:
    default: .tk/default/Taskfile.yaml
    git: .tk/git/Taskfile.yaml
    golangci: .tk/golangci/Taskfile.yaml
    install: .tk/install/Taskfile.yaml
    trufflehog: .tk/trufflehog/Taskfile.yaml

tasks:
  build:
    desc: Build runtime binary
    cmds:
      - CGO_ENABLED=0 go build -o runtime ./cmd/runtime/

  run:
    desc: Run the runtime locally
    cmds:
      - go run ./cmd/runtime/ {{.CLI_ARGS}}

  test:
    desc: Run unit tests with the race detector.
    cmds:
      - go test -race ./...

  clean:
    desc: Remove build artifacts and clear the test cache.
    cmds:
      - rm -rf bin dist runtime
      - go clean -testcache

  image:publish:
    desc: Cross-build the runtime and push as multi-arch BIN image via the local daemon. Set TAGS="v1.0.0-alpha.1 v1.0.0 v1.0 v1 latest" for the full cadence.
    vars:
      TAGS: '{{.TAGS | default "latest"}}'
      REGISTRY: '{{.REGISTRY | default "ghcr.io/openotters"}}'
      OUT_DIR: '{{.OUT_DIR | default "/tmp/otters-runtime"}}'
      OTTERS: '{{.OTTERS | default "otters"}}'
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o {{.OUT_DIR}}/runtime-darwin-arm64 ./cmd/runtime
      - GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o {{.OUT_DIR}}/runtime-darwin-amd64 ./cmd/runtime
      - GOOS=linux  GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o {{.OUT_DIR}}/runtime-linux-arm64  ./cmd/runtime
      - GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o {{.OUT_DIR}}/runtime-linux-amd64  ./cmd/runtime
      # One build call into the daemon's local registry, tagged with every
      # alias in TAGS at once. Each push then picks one tag and ships it.
      - >-
        flags=""; for t in {{.TAGS}}; do flags="$flags -t {{.REGISTRY}}/runtime:$t"; done;
        {{.OTTERS}} bin build -n runtime -d "openotters agent runtime" $flags
        darwin/arm64:{{.OUT_DIR}}/runtime-darwin-arm64
        darwin/amd64:{{.OUT_DIR}}/runtime-darwin-amd64
        linux/arm64:{{.OUT_DIR}}/runtime-linux-arm64
        linux/amd64:{{.OUT_DIR}}/runtime-linux-amd64
      - for: {var: TAGS}
        cmd: '{{.OTTERS}} bin push {{.REGISTRY}}/runtime:{{.ITEM}}'